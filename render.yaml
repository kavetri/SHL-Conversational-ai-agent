services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt && python scraper/convert_catalog.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
